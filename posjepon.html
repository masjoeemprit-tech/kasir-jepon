<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#ff7a00">
    <title>Angkringan Jepon</title>

    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #f2f2f2; -webkit-tap-highlight-color: transparent; }
        header { background: linear-gradient(45deg, #ff7a00, #ffb347); color: white; padding: 15px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        nav { margin-top: 10px; display: flex; flex-wrap: wrap; gap: 8px; }
        nav button { background: white; border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-weight: bold; color: #ff7a00; font-size: 12px; }
        #kategoriBar { text-align: center; padding: 10px; overflow-x: auto; white-space: nowrap; background: #fff; margin-bottom: 5px; }
        #kategoriBar button { background: #eee; color: #333; border: none; padding: 8px 15px; margin: 0 3px; border-radius: 20px; font-size: 12px; }
        #kategoriBar button.active { background: #ff7a00; color: white; }
        #produkGrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 10px; padding: 10px; }
        .produk { background: white; border-radius: 10px; padding: 8px; text-align: center; border: 1px solid #ddd; }
        .produk img { width: 100%; height: 70px; object-fit: cover; border-radius: 6px; background: #fafafa; }
        .produk p { margin: 5px 0; font-size: 12px; font-weight: bold; line-height: 1.2; }
        #keranjang { background: white; margin: 10px; padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .total-section { font-size: 18px; font-weight: bold; margin: 10px 0; text-align: right; color: #ff7a00; }
        #uangBayar { width: 100%; padding: 12px; border: 1px solid #ff7a00; border-radius: 8px; text-align: center; font-size: 16px; margin-bottom: 10px; box-sizing: border-box; }
        .popup { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); align-items: center; justify-content: center; z-index: 1000; }
        .popupBox { background: white; padding: 20px; border-radius: 15px; width: 85%; max-width: 300px; }
        .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 10px; }
        .keypad button { padding: 15px; font-size: 18px; border: none; background: #f8f8f8; border-radius: 8px; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; background: white; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        @media print { body * { visibility: hidden; } #strukCetak, #strukCetak * { visibility: visible; } #strukCetak { position: absolute; left: 0; top: 0; width: 58mm; display: block !important; } }
    </style>
</head>
<body>

    <header id="header">
        <h2 id="judulToko" style="margin:0; font-size: 18px;">Angkringan Jepon</h2>
        <nav>
            <button onclick="showKasir()">Kasir</button>
            <button onclick="showProduk()">Stok</button>
            <button onclick="showLaporan()">Laporan</button>
            <button onclick="logout()" style="background:#ff4444; color:white">Keluar</button>
        </nav>
    </header>

    <div id="kasirPage">
        <div id="kategoriBar">
            <button class="active" onclick="filterKategori('Semua', this)">Semua</button>
            <button onclick="filterKategori('Nasi', this)">Nasi</button>
            <button onclick="filterKategori('Lauk', this)">Lauk</button>
            <button onclick="filterKategori('Minuman', this)">Minuman</button>
            <button onclick="filterKategori('Titipan', this)">Titipan</button>
        </div>
        <div id="produkGrid"></div>
        <div id="keranjang">
            <div id="cartList"></div>
            <div class="total-section">Total: Rp <span id="totalBelanja">0</span></div>
            <input id="uangBayar" placeholder="Klik untuk bayar" readonly onclick="openKeypad('bayar')">
            <div style="display: flex; gap: 8px;">
                <button onclick="prosesBayar()" style="flex:1; padding:12px; background:#28a745; color:white; border:none; border-radius:8px; font-weight:bold">SIMPAN</button>
                <button onclick="cetakStruk()" style="flex:1; padding:12px; background:#007bff; color:white; border:none; border-radius:8px; font-weight:bold">CETAK</button>
            </div>
        </div>
    </div>

    <div id="produkPage" style="display:none; padding:15px;">
        <h3>Tambah Produk</h3>
        <input id="namaProduk" placeholder="Nama Produk" style="width:100%; padding:10px; margin-bottom:5px;">
        <input id="hargaProduk" type="number" placeholder="Harga" style="width:100%; padding:10px; margin-bottom:5px;">
        <input id="stokProduk" type="number" placeholder="Stok" style="width:100%; padding:10px; margin-bottom:5px;">
        <select id="kategoriProduk" style="width:100%; padding:10px; margin-bottom:10px;">
            <option>Nasi</option><option>Lauk</option><option>Minuman</option><option>Titipan</option>
        </select>
        <input type="file" id="fotoProduk" accept="image/*" style="margin-bottom:10px;">
        <button onclick="tambahProduk()" style="width:100%; padding:12px; background:#ff7a00; color:white; border:none; border-radius:8px;">Simpan Produk</button>
        <table style="margin-top:20px;">
            <thead><tr><th>Produk</th><th>Stok</th><th>Harga</th><th>Aksi</th></tr></thead>
            <tbody id="tabelProduk"></tbody>
        </table>
    </div>

    <div id="laporanPage" style="display:none; padding:15px;">
        <h3>Pendapatan</h3>
        <p>Sendiri: <b id="pendapatanSendiri">0</b></p>
        <p>Titipan: <b id="pendapatanTitipan">0</b></p>
        <button onclick="hapusRiwayat()" style="background:red; color:white; padding:8px; border:none; border-radius:5px;">Hapus Riwayat</button>
        <table style="margin-top:10px;">
            <thead><tr><th>Waktu</th><th>Item</th><th>Total</th></tr></thead>
            <tbody id="tabelLaporan"></tbody>
        </table>
    </div>

    <div id="popupKeypad" class="popup">
        <div class="popupBox">
            <h3 id="keypadTitle" style="margin:0 0 10px 0; color:#ff7a00">Input</h3>
            <input id="keypadInput" readonly style="width:100%; font-size:24px; text-align:center; padding:10px; border:1px solid #ddd; border-radius:8px; margin-bottom:10px;">
            <div class="keypad">
                <button onclick="angka(1)">1</button><button onclick="angka(2)">2</button><button onclick="angka(3)">3</button>
                <button onclick="angka(4)">4</button><button onclick="angka(5)">5</button><button onclick="angka(6)">6</button>
                <button onclick="angka(7)">7</button><button onclick="angka(8)">8</button><button onclick="angka(9)">9</button>
                <button onclick="clearKey()" style="color:red">C</button><button onclick="angka(0)">0</button>
                <button onclick="okKey()" style="background:#28a745; color:white">OK</button>
            </div>
            <button onclick="closeKey()" style="width:100%; margin-top:15px; border:none; background:none; color:#666;">Batal</button>
        </div>
    </div>

    <div id="strukCetak" style="display:none; font-family:monospace; font-size:12px; width:58mm;">
        <center><h3 id="strukJudul">Angkringan Jepon</h3><p id="strukWaktu"></p></center>
        <hr style="border-top:1px dashed #000">
        <div id="strukIsi"></div>
        <hr style="border-top:1px dashed #000">
        <div id="strukTotal"></div>
        <center><p>Matur Nuwun</p></center>
    </div>

    <script>
        let produk = JSON.parse(localStorage.produk_jepon || "[]");
        let laporan = JSON.parse(localStorage.laporan_jepon || "[]");
        let cart = {}; let total = 0; let mode = ""; let pIdx = 0; let kateg = "Semua";

        function saveData() { localStorage.produk_jepon = JSON.stringify(produk); localStorage.laporan_jepon = JSON.stringify(laporan); }

        function showKasir() { hideAll(); document.getElementById('kasirPage').style.display = 'block'; renderProduk(); }
        function showProduk() { hideAll(); document.getElementById('produkPage').style.display = 'block'; renderTabelProduk(); }
        function showLaporan() { hideAll(); document.getElementById('laporanPage').style.display = 'block'; renderLaporan(); }
        function hideAll() { ['kasirPage','produkPage','laporanPage'].forEach(id => document.getElementById(id).style.display='none'); }

        function filterKategori(k, btn) { 
            kateg = k; 
            document.querySelectorAll('#kategoriBar button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderProduk(); 
        }

        function renderProduk() {
            const grid = document.getElementById('produkGrid'); grid.innerHTML = "";
            produk.forEach((p, i) => {
                if(kateg !== "Semua" && p.kategori !== kateg) return;
                grid.innerHTML += `<div class="produk" onclick="pilih(${i})"><img src="${p.foto||''}"><p>${p.nama}</p><span>${p.harga}</span></div>`;
            });
        }

        function pilih(i) { pIdx = i; document.getElementById('keypadTitle').innerText = "Jumlah Beli"; openKeypad("qty"); }
        function openKeypad(m) { mode = m; document.getElementById('popupKeypad').style.display = 'flex'; document.getElementById('keypadInput').value = ""; }
        function angka(n) { document.getElementById('keypadInput').value += n; }
        function clearKey() { document.getElementById('keypadInput').value = ""; }
        function closeKey() { document.getElementById('popupKeypad').style.display = 'none'; }
        
        function okKey() {
            let v = Number(document.getElementById('keypadInput').value);
            if(mode === "qty") {
                if(v > produk[pIdx].stok) { alert("Stok kurang!"); }
                else { 
                    if(!cart[pIdx]) cart[pIdx] = { nama: produk[pIdx].nama, harga: produk[pIdx].harga, qty: 0, k: produk[pIdx].kategori };
                    cart[pIdx].qty += v; produk[pIdx].stok -= v; renderCart(); renderProduk(); saveData();
                }
            } else { document.getElementById('uangBayar').value = v; }
            closeKey();
        }

        function renderCart() {
            const list = document.getElementById('cartList'); list.innerHTML = ""; total = 0;
            Object.values(cart).forEach(c => { total += (c.qty*c.harga); list.innerHTML += `<div style="display:flex; justify-content:space-between; font-size:13px; margin-bottom:5px;"><span>${c.nama} x${c.qty}</span><span>${c.qty*c.harga}</span></div>`; });
            document.getElementById('totalBelanja').innerText = total;
        }

        function prosesBayar() {
            if(total === 0) return;
            let tgl = new Date().toLocaleString();
            Object.values(cart).forEach(c => { laporan.push({ tgl, item: c.nama, total: c.qty*c.harga, jenis: c.k=="Titipan"?"T":"S" }); });
            saveData(); alert("Berhasil Disimpan!"); cart = {}; total = 0; document.getElementById('uangBayar').value = ""; renderCart();
        }

        function tambahProduk() {
            let f = document.getElementById('fotoProduk').files[0];
            let nama = document.getElementById('namaProduk').value;
            let harga = Number(document.getElementById('hargaProduk').value);
            let stok = Number(document.getElementById('stokProduk').value);
            let kat = document.getElementById('kategoriProduk').value;
            if(!nama || !harga) return;
            if(f) {
                let r = new FileReader(); r.onload = function(e) {
                    let img = new Image(); img.src = e.target.result;
                    img.onload = function() {
                        let canvas = document.createElement('canvas'); let ctx = canvas.getContext('2d');
                        canvas.width = 200; canvas.height = 200; ctx.drawImage(img, 0, 0, 200, 200);
                        produk.push({ nama, harga, stok, kategori: kat, foto: canvas.toDataURL('image/jpeg', 0.6) });
                        saveData(); renderTabelProduk();
                    }
                }; r.readAsDataURL(f);
            } else {
                produk.push({ nama, harga, stok, kategori: kat, foto: "" });
                saveData(); renderTabelProduk();
            }
        }

        function renderTabelProduk() {
            const t = document.getElementById('tabelProduk'); t.innerHTML = "";
            produk.forEach((p, i) => { t.innerHTML += `<tr><td>${p.nama}</td><td>${p.stok}</td><td>${p.harga}</td><td><button onclick="hapusP(${i})" style="background:red; color:white; border:none; padding:5px;">X</button></td></tr>`; });
        }
        function hapusP(i) { if(confirm("Hapus?")) { produk.splice(i,1); saveData(); renderTabelProduk(); } }

        function renderLaporan() {
            const t = document.getElementById('tabelLaporan'); t.innerHTML = "";
            let s=0, tp=0;
            laporan.forEach(l => { if(l.jenis=="T") tp+=l.total; else s+=l.total; t.innerHTML += `<tr><td>${l.tgl}</td><td>${l.item}</td><td>${l.total}</td></tr>`; });
            document.getElementById('pendapatanSendiri').innerText = s; document.getElementById('pendapatanTitipan').innerText = tp;
        }
        function hapusRiwayat() { if(confirm("Hapus semua?")) { laporan = []; saveData(); renderLaporan(); } }
        function logout() { location.reload(); }

        function cetakStruk() {
            document.getElementById('strukWaktu').innerText = new Date().toLocaleString();
            let isi = ""; Object.values(cart).forEach(c => { isi += `<div style="display:flex; justify-content:space-between"><span>${c.nama} x${c.qty}</span><span>${c.qty*c.harga}</span></div>`; });
            document.getElementById('strukIsi').innerHTML = isi;
            document.getElementById('strukTotal').innerHTML = `<div style="display:flex; justify-content:space-between; font-weight:bold"><span>TOTAL</span><span>${total}</span></div>`;
            window.print();
        }

        showKasir();
    </script>
</body>
</html>
